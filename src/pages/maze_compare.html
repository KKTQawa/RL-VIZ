<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>迷宫强化学习对比</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    body {
      min-height: 100vh;
      padding: 24px;
      display: grid;
      gap: 18px;
      overflow-y: auto;
    }

    .compare-shell,
    .compare-panel {
      border-radius: 28px;
      background: var(--ink-panel);
      border: 1px solid var(--ink-border);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(12px);
    }

    .compare-shell {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .compare-title {
      margin: 0;
      font-size: 28px;
      color: var(--ink-heading-primary);
    }

    .compare-subtitle {
      margin: 6px 0 0;
      color: var(--ink-copy);
      line-height: 1.7;
      font-size: 14px;
    }

    .compare-controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .compare-field {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(14, 82, 92, 0.74);
      border: 1px solid rgba(108, 214, 203, 0.14);
    }

    .compare-field label {
      font-size: 12px;
      color: rgba(184, 232, 226, 0.9);
      letter-spacing: 0.04em;
    }

    .compare-field input,
    .compare-field select {
      border-radius: 12px;
      border: 1px solid var(--ink-border);
      padding: 10px 12px;
      color: var(--ink-text);
      font-weight: 600;
      background: rgba(10, 58, 65, 0.82);
    }

    .compare-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .compare-actions button {
      width: auto;
      min-width: 148px;
    }

    .compare-status {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(93, 207, 201, 0.12);
      border: 1px solid rgba(108, 214, 203, 0.16);
      color: var(--ink-text);
      line-height: 1.7;
      white-space: pre-line;
    }

    .compare-viewers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .compare-panel {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .compare-panel h2 {
      margin: 0;
      font-size: 20px;
      color: var(--ink-heading-secondary);
    }

    .compare-panel p {
      margin: 0;
      color: var(--ink-copy-soft);
      font-size: 13px;
    }

    .compare-viewer-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .compare-viewer-toolbar select {
      min-width: 220px;
      border-radius: 12px;
      border: 1px solid var(--ink-border);
      padding: 9px 12px;
      color: var(--ink-text);
      background: rgba(10, 58, 65, 0.82);
    }

    .compare-canvas {
      display: block;
      width: min(100%, 620px);
      height: auto;
      border-radius: 22px;
      background: rgba(10, 58, 65, 0.72);
      border: 1px solid rgba(108, 214, 203, 0.14);
      justify-self: center;
    }

    .compare-meta {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(14, 82, 92, 0.68);
      border: 1px solid rgba(108, 214, 203, 0.14);
    }

    .compare-meta__row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink-text);
      font-size: 13px;
    }

    .compare-meta__row span {
      color: rgba(184, 232, 226, 0.88);
    }

    .compare-meta__empty {
      margin: 0;
      color: rgba(184, 232, 226, 0.88);
    }

    .compare-charts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .compare-chart {
      min-height: 280px;
    }

    @media (max-width: 1080px) {
      .compare-viewers,
      .compare-charts {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script type="module" crossorigin src="/RL-VIZ/assets/mazeCompare-rFItpddp.js"></script>
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/dist-6tjBzsZC.js">
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/ink-theme-B9CfNZtT.js">
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/episodeTrace-Dv7cCdsY.js">
  <link rel="stylesheet" crossorigin href="/RL-VIZ/assets/ink-theme-BrGjx0TA.css">
</head>
<body>
  <div class="compare-shell">
    <div>
      <h1 class="compare-title">迷宫强化学习对比</h1>
      <p class="compare-subtitle">在同一张迷宫地图上运行 Q-learning 和 PPO，对比两种算法的实时路径行为，并观察 reward、steps 和 success rate 的训练差异。</p>
    </div>

    <div class="compare-controls">
      <div class="compare-field">
        <label for="episodesInput">训练轮数</label>
        <input id="episodesInput" type="number" min="5" max="500" value="80" />
      </div>
      <div class="compare-field">
        <label for="rowsInput">迷宫行数（奇数）</label>
        <input id="rowsInput" type="number" min="5" max="41" value="21" />
      </div>
      <div class="compare-field">
        <label for="colsInput">迷宫列数（奇数）</label>
        <input id="colsInput" type="number" min="5" max="41" value="21" />
      </div>
      <div class="compare-field">
        <label for="maxStepsInput">每轮最大步数</label>
        <input id="maxStepsInput" type="number" min="30" max="1000" value="300" />
      </div>
    </div>

    <div class="compare-actions">
      <button id="generateBtn">生成共享迷宫</button>
      <button id="trainQBtn">运行迷宫 Q-learning</button>
      <button id="trainPpoBtn">运行迷宫 PPO</button>
      <button id="compareBtn">运行完整对比</button>
    </div>

    <div id="statusBox" class="compare-status">准备就绪。</div>
  </div>

  <div class="compare-viewers">
    <div class="compare-panel">
      <div>
        <h2>迷宫 Q-learning 基线</h2>
        <p>在共享迷宫地图上进行值表更新训练。</p>
      </div>
      <div class="compare-viewer-toolbar">
        <select id="qEpisodeSelect"></select>
      </div>
      <canvas id="qCanvas" class="compare-canvas" width="620" height="620"></canvas>
      <div id="qMeta" class="compare-meta"></div>
    </div>

    <div class="compare-panel">
      <div>
        <h2>迷宫 PPO</h2>
        <p>在完全相同的共享迷宫地图上进行策略梯度训练。</p>
      </div>
      <div class="compare-viewer-toolbar">
        <select id="ppoEpisodeSelect"></select>
      </div>
      <canvas id="ppoCanvas" class="compare-canvas" width="620" height="620"></canvas>
      <div id="ppoMeta" class="compare-meta"></div>
    </div>
  </div>

  <div class="compare-charts">
    <div class="compare-panel">
      <h2>步数对比</h2>
      <div id="stepsChart" class="compare-chart"></div>
    </div>
    <div class="compare-panel">
      <h2>成功率对比</h2>
      <div id="successChart" class="compare-chart"></div>
    </div>
    <div class="compare-panel">
      <h2>奖励对比</h2>
      <div id="rewardChart" class="compare-chart"></div>
    </div>
  </div>

</body>
</html>

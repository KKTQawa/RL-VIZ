<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Maze RL Environment</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- <script type="module" src="/src/envs/maze/maze.js"></script> -->
    <style>
        body {
            margin: 0;
            display: flex;
            overflow-x: auto;
            overflow-y: auto;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        #show {
            flex: 1;
            margin: 0;
            display: flex;
            width: 100%;
            position: relative;
        }

        #maze_info {
            position: absolute;
            top: 30px;
            font-size: 20px;
        }

        #game {
            min-height: 800px;
            padding: 80px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
        }

        #maze_tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 8px;
            border-radius: 6px;
            pointer-events: none;
            display: none;
            max-width: 400px;
            max-height: 300px;
            z-index: 999;
        }

        #controls {
            width: 200px;
            padding: 10px;
        }

        #maze_explainer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #maze_explainer_text {
            width: 70%;
            font-size: 24px;
        }

        #QTable {
            position: absolute;
            left: 10px;
            top: 80px;

            background: rgba(20, 20, 30, 0.85);
            color: #e6e6e6;

            border-radius: 10px;
            padding: 10px;

            font-size: 16px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
        }

        #maze_formula {
            position: absolute;
            left: 10px;
            top: 10px;
            background: rgba(20, 20, 30, 0.85);
            color: #e6e6e6;

            border-radius: 10px;
            padding: 6px;

            font-size: 16px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            height: 50px;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .maze_v {
            position: absolute;
            left: 10px;
            background: rgba(20, 20, 30, 0.85);
            color: #9ecbff;
            width: 80px;

            border-radius: 10px;
            padding: 6px;

            font-size: 16px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);

            display: flex;
            align-items: center;

        }

        #cfgQagent_s {
            top: 300px;
        }

        #cfgQagent_a {
            top: 340px;
        }

        #cfgQagent_r {
            top: 380px;
        }

        #cfgQagent_qs {
            top: 420px;
        }

        #QTable table {
            border-collapse: collapse;
        }

        #QTable th,
        #QTable td {
            padding: 6px 10px;
            text-align: center;

            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #QTable th {
            color: #9ecbff;
            font-weight: 600;
        }

        #QTable td {
            font-family: "Consolas", monospace;
            min-width: 70px;
        }

        /* hover */
        #QTable tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        /* 表头强化 */
        #QTable tr:first-child th {
            border-bottom: 2px solid rgba(120, 180, 255, 0.5);
        }

        button {
            width: 100%;
            margin-bottom: 10px;
        }

        .step-container {
            margin: 12px 0;
            padding: 10px;
            border-radius: 10px;
            background: rgba(20, 20, 30, 0.4);
        }

        .step-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
        }

        .step-flow {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .step-node {
            position: relative;
            padding: 8px 12px;
            margin: 6px;
            border-radius: 10px;
            background: #2b2f3a;
            color: #aaa;
            font-size: 13px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .step-node.active {
            background: #4c8bf5;
            color: #fff;
            transform: scale(1.05);
        }

        /* ===== 动态连接线 ===== */
        .step-node::after {
            content: "";
            position: absolute;
            top: 50%;
            right: -18px;
            width: 18px;
            height: 2px;
            background: repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, 0.8) 0px,
                    rgba(255, 255, 255, 0.8) 4px,
                    transparent 4px,
                    transparent 8px);
            animation: flow 0.8s linear infinite;
        }

        .step-node:last-child::after {
            display: none;
        }

        /* ===== 容器 ===== */
        .flow {
            margin: 12px 0;
            padding: 12px;
            border-radius: 12px;
            background: rgba(20, 22, 30, 0.6);
        }

        /* ===== 标题 ===== */
        .flow-title {
            color: #fff;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* ===== 主线 ===== */
        .flow-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== 节点 ===== */
        .flow-node {
            position: relative;
            padding: 8px 12px;
            margin-right: 28px;
            border-radius: 10px;
            font-size: 13px;
            color: #aaa;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
        }

        /* ===== 累积高亮 ===== */
        .flow-node.active {
            color: #fff;
            background: linear-gradient(135deg, #4c8bf5, #6ea8ff);
            box-shadow: 0 0 12px rgba(76, 139, 245, 0.6);
            transform: scale(1.05);
        }

        /* ===== 已完成状态 ===== */
        .flow-node.done {
            color: #e6f0ff;
            background: rgba(76, 139, 245, 0.25);
        }

        /* ===== >>>>> 动态流动箭头 ===== */
        .flow-node::after {
            content: ">>>>>";

            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);

            font-size: 12px;
            letter-spacing: 2px;

            color: rgba(255, 255, 255, 0.2);
        }

        /* active时箭头动画 */
        .flow-node.active::after {
            color: #4c8bf5;
            animation: flowMove 0.8s linear infinite;
        }

        /* 流动动画（像能量流） */
        @keyframes flowMove {
            0% {
                opacity: 0.2;
                transform: translateY(-50%) translateX(0);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.2;
                transform: translateY(-50%) translateX(6px);
            }
        }

        /* 最后一个没有箭头 */
        .flow-node:last-child::after {
            display: none;
        }

        @keyframes flow {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 16px 0;
            }
        }
    </style>
  <script type="module" crossorigin src="/RL-VIZ/assets/maze-Cow1wjxZ.js"></script>
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/modulepreload-polyfill-Dezn_h7o.js">
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/preload-helper-DB-v99-l.js">
</head>

<body>
    <div id="show">
        <div id="game">
            <div id="maze_info">
                <span id="currentEpisode">episode: 0</span>

            </div>
            <table id="QTable"></table>
            <span id="maze_formula"></span>
            <span class="maze_v" id="cfgQagent_s">s: 0,0</span>
            <span class="maze_v" id="cfgQagent_a">a: 0</span>
            <span class="maze_v" id="cfgQagent_r">r: 0</span>
            <span class="maze_v" id="cfgQagent_qs">s': 0,0</span>
            <span id="maze_tooltip"></span>

        </div>

        <div id="controls">
            <button id="resetBtn">重置所有</button>
            <button id="resetAgentBtn">重置智能体</button>
            <button id="fresh">刷新页面/刷新地图</button>

            <button id="trainBtn">训练</button>
            <button id="stepTrainBtn">训练一轮</button>
            <button id="stopBtn">停止训练</button>
            <button id="stepBtn">下一步</button>
            <button id="testBtn">测试</button>

            <button id="debugBtn">打印Q表</button>
            <button id="restoreBtn">恢复默认设置</button>

            <div class="cfgRow">
                <label>显示训练过程动画</label>
                <input type="checkbox" id="cfgRenderTrain" checked />
            </div>

            <div class="cfgRow">
                <label>步进时更新Q表</label>
                <input type="checkbox" id="cfgStepMode" />
            </div>

            <div class="cfgRow">
                <label>流型渲染</label>
                <input type="checkbox" id="cfgHighRender" />
            </div>

            <div class="cfgRow">
                <label>显示路径</label>
                <input type="checkbox" id="cfgShowPath" />
            </div>

            <div class="cfgRow">
                <label>最大训练轮数</label>
                <input type="number" id="cfgEpisodes" value="150" />
            </div>

            <div class="cfgRow">
                <label>每轮最大步数</label>
                <input type="number" id="cfgMaxSteps" value="400" />
            </div>

            <div class="cfgRow">
                <label>渲染速度（ms/步）</label>
                <input type="number" id="cfgRenderSpeed" value="10" />
            </div>

            <div class="cfgRow">
                <label>快速渲染间隔（轮）</label>
                <input type="number" id="cfgEpRenderInterval" value="20" />
            </div>

            <div class="cfgRow">
                <label>迷宫列数(必须奇数)</label>
                <input type="number" id="cfgCols" value="21" />
            </div>

            <div class="cfgRow">
                <label>迷宫行数(必须奇数)</label>
                <input type="number" id="cfgRows" value="21" />
            </div>

            <div class="cfgRow">
                <label>α 学习率</label>
                <input type="number" step="0.01" id="cfgAlpha" value="0.1" />
            </div>

            <div class="cfgRow">
                <label>γ 折扣因子</label>
                <input type="number" step="0.01" id="cfgGamma" value="0.95" />
            </div>

            <div class="cfgRow">
                <label>ε 探索因子</label>
                <input type="number" step="0.01" id="cfgEpsilon" value="0.1" />
            </div>

        </div>


    </div>
    <div id="maze_explainer">
        <div id="maze_steps">
            <div id="maze_trainSteps" class="step-container"></div>
            <div id="maze_testSteps" class="step-container"></div>
        </div>
        <div id="maze_explainer_text">

        </div>
    </div>
    <div id="graph">
        <div id="graph-container"></div>
    </div>


</body>

</html>

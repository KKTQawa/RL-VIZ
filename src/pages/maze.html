<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Maze RL Environment</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script> -->

    <style>
        body {
            margin: 0;
            display: flex;
            overflow-x: auto;
            overflow-y: auto;
            flex-direction: column;
            height: 100%;
            position: relative;
        }
    
        #show {
            flex: 1;
            margin: 0;
            display: flex;
            width: 100%;
            position: relative;
        }
    
        #maze_info {
            position: absolute;
            top: 30px;
            font-size: 20px;
        }
    
        #game {
            min-height: 800px;
            padding: 80px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
        }
    
        #maze_tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 8px;
            border-radius: 6px;
            pointer-events: none;
            display: none;
            max-width: 400px;
            max-height: 300px;
            z-index: 999;
        }
    
        #controls {
            width: 200px;
            padding: 10px;
        }
    
        button {
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
  <script type="module" crossorigin src="/RL-VIZ/assets/maze-BqS8va8c.js"></script>
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/chunk-Cyuzqnbw.js">
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/modulepreload-polyfill-Dezn_h7o.js">
</head>

<body>
<div id="show">
    <div id="game">
        <div id="maze_info" >
            <span id="currentEpisode"></span>
        </div>
        <div id="maze_tooltip"></div>
    </div>

    <div id="controls">
        <button id="resetBtn">重置所有</button>
        <button id="resetAgentBtn">重置智能体</button>
        <button id="fresh">刷新页面/刷新地图</button>

        <button id="trainBtn">训练</button>
        <button id="stepTrainBtn">训练一轮</button>
        <button id="stopBtn">停止训练</button>
        <button id="stepBtn">下一步</button>
        <button id="testBtn">测试</button>
        
        <button id="debugBtn">打印Q表</button>
        <button id="restoreBtn">恢复默认设置</button>

        <div class="cfgRow">
            <label>显示训练过程动画</label>
            <input type="checkbox" id="cfgRenderTrain" checked />
        </div>
    
        <div class="cfgRow">
            <label>步进时更新Q表</label>
            <input type="checkbox" id="cfgStepMode" />
        </div>

        <div class="cfgRow">
            <label>流型渲染</label>
            <input type="checkbox" id="cfgHighRender" />
        </div>
    
        <div class="cfgRow">
            <label>最大训练轮数</label>
            <input type="number" id="cfgEpisodes" value="150" />
        </div>
    
        <div class="cfgRow">
            <label>每轮最大步数</label>
            <input type="number" id="cfgMaxSteps" value="400" />
        </div>

        <div class="cfgRow">
            <label>渲染速度（ms/步）</label>
            <input type="number" id="cfgRenderSpeed" value="10" />
        </div>
        
        <div class="cfgRow">
            <label>快速渲染间隔（轮）</label>
            <input type="number" id="cfgEpRenderInterval" value="20" />
        </div>        
    
        <div class="cfgRow">
            <label>迷宫列数(必须奇数)</label>
            <input type="number" id="cfgCols" value="21" />
        </div>
    
        <div class="cfgRow">
            <label>迷宫行数(必须奇数)</label>
            <input type="number" id="cfgRows" value="21" />
        </div>
    
        <div class="cfgRow">
            <label>α 学习率</label>
            <input type="number" step="0.01" id="cfgAlpha" value="0.1" />
        </div>
    
        <div class="cfgRow">
            <label>γ 折扣因子</label>
            <input type="number" step="0.01" id="cfgGamma" value="0.95" />
        </div>
    
        <div class="cfgRow">
            <label>ε 探索因子</label>
            <input type="number" step="0.01" id="cfgEpsilon" value="0.1" />
        </div>

    </div>


</div>
<div id="graph">
    <div id="graph-container"></div>
</div>


</body>

</html>

<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Maze RL Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- <script type="module" src="/src/envs/maze/maze.js"></script> -->
    <style>
        body {
            display: flex;
            overflow-x: auto;
            overflow-y: auto;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            padding: 24px;
        }

        #cfgQValue {
            position: absolute;
            right: 230px;
            top: 10px;
            width: 320px;
            height: 300px;
            overflow-y: auto;
        }

        #cfgQValue::-webkit-scrollbar {
            width: 8px;
        }

        #cfgQValue::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #cfgQValue::-webkit-scrollbar-thumb {
            background: #89ccf4 rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #cfgQValue {
            scrollbar-width: thin;
            scrollbar-color: #89ccf4 rgba(255, 255, 255, 0.05);
        }

        #show {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 24px;
            position: relative;
            padding: 24px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(12px);
        }

        #maze_info {
            position: absolute;
            top: 30px;
            left: 26px;
            font-size: 18px;
            color: var(--gold);
            letter-spacing: 0.04em;
        }

        #game {
            min-height: 800px;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;

        }

        #maze_tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.94);
            color: var(--ink-text);
            padding: 10px 12px;
            border-radius: 12px;
            pointer-events: none;
            display: none;
            max-width: 450px;
            max-height: 300px;
            z-index: 999;

            word-wrap: break-word;
            /* 允许长单词换行 */
            word-break: break-word;
            /* 在任意位置断行 */
            white-space: normal;
            /* 正常换行（默认值） */
            overflow-y: auto;
            /* 内容超出时显示滚动条 */
            line-height: 1.5;
            /* 行高，提升可读性 */
        }

        #controls {
            width: 316px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(12px);
        }

        #maze_explainer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 18px;
            margin-top: 18px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.75);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        #maze_explainer_text {
            width: 70%;
            font-size: 22px;
        }

        #QTable {
            position: absolute;
            left: 10px;
            top: 80px;
            background: rgba(255, 255, 255, 0.88);
            color: var(--ink-text);
            border-radius: 16px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(6px);
        }

        #maze_formula {
            position: absolute;
            left: 10px;
            top: 10px;
            background: rgba(255, 255, 255, 0.88);
            color: var(--ink-text);
            border-radius: 16px;
            padding: 6px;
            font-size: 16px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(6px);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .maze_v {
            position: absolute;

            background: rgba(20, 20, 30, 0.85);
            color: #9ecbff;
            width: 180px;

            border-radius: 10px;
            padding: 6px;
            font-size: 16px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
        }

        #cfgQagent_s {
            top: 300px;
            left: 10px;
        }

        #cfgQagent_a {
            top: 340px;
            left: 10px;
        }

        #cfgQagent_r {
            top: 380px;
            left: 10px;
        }

        #cfgQagent_qs {
            top: 420px;
            left: 10px;
        }

        #QTable table {
            border-collapse: collapse;
        }

        #QTable th,
        #QTable td {
            padding: 6px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #QTable th {
            color: var(--jade);
            font-weight: 600;
        }

        #QTable td {
            font-family: "Consolas", monospace;
            min-width: 70px;
        }

        /* hover */
        #QTable tr:hover td {
            background: rgba(95, 158, 160, 0.05);
        }

        #QTable tr:first-child th {
            border-bottom: 2px solid rgba(95, 158, 160, 0.25);
        }

        button {
            width: 100%;
        }

        #maze_steps {
            position: absolute;
            bottom: 150px;
            right: 230px;

            /* z-index: 999; */

            backdrop-filter: blur(10px);
            border-radius: 12px;

            display: flex;
            justify-content: center;
            font-size: 24px;
        }

        .step-container {
            position: relative;
            padding: 12px 14px;
            border-radius: 12px;

            background: rgba(20, 22, 30, 0.75);
            border: 1px solid rgba(120, 160, 255, 0.15);

            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.35);
            font-size: 24px;
        }

        .flow-title {
            color: #cfe3ff;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* ===== 主线 ===== */
        .flow-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 18px;
        }

        .flow-node {
            position: relative;

            padding: 8px 12px;
            border-radius: 10px;

            font-size: 20px;
            color: #e4edf4;

            border: 1px solid rgba(255, 255, 255, 0.06);

            transition: all 0.25s ease;

            cursor: pointer;
            width: 90%;
        }

        .flow-node:hover {
            transform: translateX(4px) scale(1.02);
            color: #66ea7a;
            border-color: rgba(120, 170, 255, 0.35);
        }

        .flow-node.active {
            color: #66ea7a;

            box-shadow: 0 0 14px rgba(76, 139, 245, 0.5);
        }

        .flow-node.done {
            color: #66ea7a;

        }

        .flow-node::after {
            content: "↓ ↓ ↓";
            position: absolute;

            left: 50%;
            bottom: -18px;

            transform: translateX(-50%);

            font-size: 20px;
            color: rgba(255, 255, 255, 0.25);
        }

        .flow-node.active::after {
            color: #66ea7a;
            animation: flowDown 0.8s linear infinite;
        }


        @keyframes flowDown {
            0% {
                opacity: 0.2;
                transform: translateX(-50%) translateY(0);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.2;
                transform: translateX(-50%) translateY(6px);
            }
        }

        /* 最后一个没有箭头 */
        .flow-node:last-child::after {
            display: none;
        }

        @keyframes flow {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 16px 0;
            }
        }

        .cfgRow {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(60, 70, 60, 0.08);
            color: var(--ink-text-soft);
        }

        .cfgRow label {
            font-size: 13px;
            color: var(--ink-text-soft);
        }

        #graph {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 18px;
        }

        #graph-container {
            width: min(1180px, 100%);
            min-height: 600px;
        }

        @media (max-width: 1180px) {
            #show {
                flex-direction: column;
            }

            #controls {
                width: 100%;
            }

            #maze_explainer_text {
                width: 100%;
            }

            #game {
                grid-template-columns: minmax(140px, 200px) minmax(0, 1fr);
            }
        }
    </style>
  <script type="module" crossorigin src="/RL-VIZ/assets/maze-DgWJ7snT.js"></script>
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/ink-theme-DtODCcuF.js">
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/preload-helper-DB-v99-l.js">
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/steps-Bj2mbzdd.js">
  <link rel="stylesheet" crossorigin href="/RL-VIZ/assets/ink-theme-CGoIS5iB.css">
</head>

<body>
    <div id="show">
        <div id="game">
            <div id="maze_info">
                <span id="currentEpisode">episode: 0</span>

            </div>
            <table id="QTable"></table>
            <span id="maze_formula"></span>
            <span class="maze_v" id="cfgQagent_s">s(当前状态): 0,0</span>
            <span class="maze_v" id="cfgQagent_a">a(当前动作): 0</span>
            <span class="maze_v" id="cfgQagent_r">r(即时奖励): 0</span>
            <span class="maze_v" id="cfgQagent_qs">s'(下一状态): 0,0</span>
            <textarea class="maze_v" id="cfgQValue"></textarea>
            <span id="maze_tooltip"></span>
            <div id="maze_steps">
                <div id="maze_Steps" class="step-container"></div>
            </div>
        </div>

        <div id="controls">
            <button id="resetBtn">复位智能体</button>
            <button id="resetAgentBtn">清空智能体</button>
            <button id="fresh">刷新页面</button>

            <button id="trainBtn">训练</button>
            <button id="stepTrainBtn">训练一轮</button>
            <button id="stopBtn">中止训练</button>
            <button id="stepBtn">下一步</button>
            <button id="stepRenderBtn">分阶段步进</button>
            <button id="testBtn">测试</button>

            <button id="debugBtn">打印Q表</button>
            <button id="restoreBtn">恢复默认设置</button>

            <div class="cfgRow">
                <label>显示训练过程动画</label>
                <input type="checkbox" id="cfgRenderTrain" checked />
            </div>

            <div class="cfgRow">
                <label>步进时更新Q表</label>
                <input type="checkbox" id="cfgStepMode" />
            </div>

            <div class="cfgRow">
                <label>流型渲染</label>
                <input type="checkbox" id="cfgHighRender" />
            </div>

            <div class="cfgRow">
                <label>显示路径</label>
                <input type="checkbox" id="cfgShowPath" />
            </div>

            <div class="cfgRow">
                <label>显示格子深度</label>
                <input type="checkbox" id="cfgShowHeatmap" />
            </div>

            <div class="cfgRow">
                <label>显示标记</label>
                <input type="checkbox" id="cfgShowMarkers" />
            </div>

            <div class="cfgRow">
                <label>显示调试信息</label>
                <input type="checkbox" id="cfgConsole" />
            </div>

            <div class="cfgRow">
                <label>最大训练轮数</label>
                <input type="number" id="cfgEpisodes" value="150" />
            </div>

            <div class="cfgRow">
                <label>每轮最大步数</label>
                <input type="number" id="cfgMaxSteps" value="400" />
            </div>

            <div class="cfgRow">
                <label>渲染速度（ms/步）</label>
                <input type="number" id="cfgRenderSpeed" value="10" />
            </div>

            <div class="cfgRow">
                <label>快速渲染间隔（轮）</label>
                <input type="number" id="cfgEpRenderInterval" value="20" />
            </div>

            <div class="cfgRow">
                <label>迷宫列数(必须奇数)</label>
                <input type="number" id="cfgCols" value="21" />
            </div>

            <div class="cfgRow">
                <label>迷宫行数(必须奇数)</label>
                <input type="number" id="cfgRows" value="21" />
            </div>

            <div class="cfgRow">
                <label>α 学习率</label>
                <input type="number" step="0.01" id="cfgAlpha" value="0.1" />
            </div>

            <div class="cfgRow">
                <label>γ 折扣因子</label>
                <input type="number" step="0.01" id="cfgGamma" value="0.95" />
            </div>

            <div class="cfgRow">
                <label>ε 探索因子</label>
                <input type="number" step="0.01" id="cfgEpsilon" value="0.1" />
            </div>

        </div>


    </div>
    <div id="maze_explainer">

        <div id="maze_explainer_text">

        </div>
    </div>
    <div id="graph">
        <div id="graph-container"></div>
    </div>
    <div id="episode-viewer-root-maze"></div>


</body>

</html>

<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Maze RL Environment</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- <script type="module" src="/src/envs/maze/maze.js"></script> -->
    <style>
        body {
            margin: 0;
            display: flex;
            overflow-x: auto;
            overflow-y: auto;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        #cfgQValue {
            position: absolute;
            right: 23px;
            top: 10px;
            width: 320px;
            height: 300px;
            overflow-y: auto;
        }

        #cfgQValue::-webkit-scrollbar {
            width: 8px;
        }

        #cfgQValue::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #cfgQValue::-webkit-scrollbar-thumb {
            background: #89ccf4 rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #cfgQValue {
            scrollbar-width: thin;
            scrollbar-color: #89ccf4 rgba(255, 255, 255, 0.05);
        }

        #show {
            flex: 1;
            margin: 0;
            display: flex;
            width: 100%;
            position: relative;
        }

        #maze_info {
            position: absolute;
            top: 30px;
            font-size: 20px;
        }

        #game {
            min-height: 800px;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;

        }

        #maze_tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 8px;
            border-radius: 6px;
            pointer-events: none;
            display: none;
            max-width: 400px;
            max-height: 300px;
            z-index: 999;
        }

        #controls {
            width: 200px;
            padding: 10px;
        }

        #maze_explainer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #maze_explainer_text {
            width: 70%;
            font-size: 24px;
        }

        #QTable {
            position: absolute;
            left: 10px;
            top: 80px;

            background: rgba(20, 20, 30, 0.85);
            color: #e6e6e6;

            border-radius: 10px;
            padding: 10px;

            font-size: 16px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
        }

        #maze_formula {
            position: absolute;
            left: 10px;
            top: 10px;
            background: rgba(20, 20, 30, 0.85);
            color: #e6e6e6;

            border-radius: 10px;
            padding: 6px;

            font-size: 16px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            height: 50px;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .maze_v {
            position: absolute;

            background: rgba(20, 20, 30, 0.85);
            color: #9ecbff;
            width: 180px;

            border-radius: 10px;
            padding: 6px;

            font-size: 16px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);

            display: flex;
            align-items: center;

        }

        #cfgQagent_s {
            top: 300px;
            left: 10px;
        }

        #cfgQagent_a {
            top: 340px;
            left: 10px;
        }

        #cfgQagent_r {
            top: 380px;
            left: 10px;
        }

        #cfgQagent_qs {
            top: 420px;
            left: 10px;
        }

        #QTable table {
            border-collapse: collapse;
        }

        #QTable th,
        #QTable td {
            padding: 6px 10px;
            text-align: center;

            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #QTable th {
            color: #9ecbff;
            font-weight: 600;
        }

        #QTable td {
            font-family: "Consolas", monospace;
            min-width: 70px;
        }

        /* hover */
        #QTable tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        /* 表头强化 */
        #QTable tr:first-child th {
            border-bottom: 2px solid rgba(120, 180, 255, 0.5);
        }

        button {
            width: 100%;
            margin-bottom: 10px;
        }

        #maze_steps {
            position: absolute;
            bottom: 100px;
            right: 230px;

            /* z-index: 999; */

            backdrop-filter: blur(10px);
            border-radius: 12px;
            width: 200px;
            display: flex;
            justify-content: center;
        }

        .step-container {
            padding: 12px 14px;
            border-radius: 12px;

            background: rgba(20, 22, 30, 0.75);
            border: 1px solid rgba(120, 160, 255, 0.15);

            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.35);
        }

        .flow-title {
            color: #cfe3ff;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* ===== 主线 ===== */
        .flow-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 18px;
        }

        .flow-node {
            position: relative;

            padding: 8px 12px;
            border-radius: 10px;

            font-size: 13px;
            color: #aab4c5;

            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);

            transition: all 0.25s ease;

            cursor: pointer;
        }

        .flow-node:hover {
            transform: translateX(4px) scale(1.02);
            background: rgba(120, 170, 255, 0.12);
            color: #ffffff;
            border-color: rgba(120, 170, 255, 0.35);
        }

        .flow-node.active {
            color: #fff;
            background: linear-gradient(135deg, #4c8bf5, #6ea8ff);
            box-shadow: 0 0 14px rgba(76, 139, 245, 0.5);
        }

        .flow-node.done {
            color: #dbe7ff;
            background: rgba(76, 139, 245, 0.18);
        }

        /* ===== >>>>> 动态流动箭头 ===== */
        .flow-node::after {
            content: "↓";
            position: absolute;

            left: 50%;
            bottom: -18px;

            transform: translateX(-50%);

            font-size: 16px;
            color: rgba(255, 255, 255, 0.25);
        }

        /* active时箭头动画 */
        .flow-node.active::after {
            color: #4c8bf5;
            animation: flowDown 0.8s linear infinite;
        }


        @keyframes flowDown {
            0% {
                opacity: 0.2;
                transform: translateX(-50%) translateY(0);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.2;
                transform: translateX(-50%) translateY(6px);
            }
        }

        /* 最后一个没有箭头 */
        .flow-node:last-child::after {
            display: none;
        }

        @keyframes flow {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 16px 0;
            }
        }
    </style>
  <script type="module" crossorigin src="/RL-VIZ/assets/maze-DZfuF856.js"></script>
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/modulepreload-polyfill-Dezn_h7o.js">
  <link rel="modulepreload" crossorigin href="/RL-VIZ/assets/preload-helper-DB-v99-l.js">
</head>

<body>
    <div id="show">
        <div id="game">
            <div id="maze_info">
                <span id="currentEpisode">episode: 0</span>

            </div>
            <table id="QTable"></table>
            <span id="maze_formula"></span>
            <span class="maze_v" id="cfgQagent_s">s(当前状态): 0,0</span>
            <span class="maze_v" id="cfgQagent_a">a(当前动作): 0</span>
            <span class="maze_v" id="cfgQagent_r">r(即时奖励): 0</span>
            <span class="maze_v" id="cfgQagent_qs">s'(下一状态): 0,0</span>
            <textarea class="maze_v" id="cfgQValue"></textarea>
            <span id="maze_tooltip"></span>
            <div id="maze_steps">
                <div id="maze_Steps" class="step-container"></div>
            </div>
        </div>

        <div id="controls">
            <button id="resetBtn">重置所有</button>
            <button id="resetAgentBtn">重置智能体</button>
            <button id="fresh">刷新页面/刷新地图</button>

            <button id="trainBtn">训练</button>
            <button id="stepTrainBtn">训练一轮</button>
            <button id="stopBtn">中止训练</button>
            <button id="stepBtn">下一步</button>
            <button id="stepRenderBtn">分阶段步进</button>
            <button id="testBtn">测试</button>

            <button id="debugBtn">打印Q表</button>
            <button id="restoreBtn">恢复默认设置</button>

            <div class="cfgRow">
                <label>显示训练过程动画</label>
                <input type="checkbox" id="cfgRenderTrain" checked />
            </div>

            <div class="cfgRow">
                <label>步进时更新Q表</label>
                <input type="checkbox" id="cfgStepMode" />
            </div>

            <div class="cfgRow">
                <label>流型渲染</label>
                <input type="checkbox" id="cfgHighRender" />
            </div>

            <div class="cfgRow">
                <label>显示路径</label>
                <input type="checkbox" id="cfgShowPath" />
            </div>

            <div class="cfgRow">
                <label>显示格子深度</label>
                <input type="checkbox" id="cfgShowHeatmap" />
            </div>

            <div class="cfgRow">
                <label>显示标记</label>
                <input type="checkbox" id="cfgShowMarkers" />
            </div>

            <div class="cfgRow">
                <label>显示调试信息</label>
                <input type="checkbox" id="cfgConsole" />
            </div>

            <div class="cfgRow">
                <label>最大训练轮数</label>
                <input type="number" id="cfgEpisodes" value="150" />
            </div>

            <div class="cfgRow">
                <label>每轮最大步数</label>
                <input type="number" id="cfgMaxSteps" value="400" />
            </div>

            <div class="cfgRow">
                <label>渲染速度（ms/步）</label>
                <input type="number" id="cfgRenderSpeed" value="10" />
            </div>

            <div class="cfgRow">
                <label>快速渲染间隔（轮）</label>
                <input type="number" id="cfgEpRenderInterval" value="20" />
            </div>

            <div class="cfgRow">
                <label>迷宫列数(必须奇数)</label>
                <input type="number" id="cfgCols" value="21" />
            </div>

            <div class="cfgRow">
                <label>迷宫行数(必须奇数)</label>
                <input type="number" id="cfgRows" value="21" />
            </div>

            <div class="cfgRow">
                <label>α 学习率</label>
                <input type="number" step="0.01" id="cfgAlpha" value="0.1" />
            </div>

            <div class="cfgRow">
                <label>γ 折扣因子</label>
                <input type="number" step="0.01" id="cfgGamma" value="0.95" />
            </div>

            <div class="cfgRow">
                <label>ε 探索因子</label>
                <input type="number" step="0.01" id="cfgEpsilon" value="0.1" />
            </div>

        </div>


    </div>
    <div id="maze_explainer">

        <div id="maze_explainer_text">

        </div>
    </div>
    <div id="graph">
        <div id="graph-container"></div>
    </div>


</body>

</html>
